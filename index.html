<!DOCTYPE html>

    <style>
      html { scroll-behavior: smooth; }
      ::selection { background-color: #6366f1; color: white; }
      
      /* Transitions */
      .faq-answer { transition: max-height 0.3s ease-in-out, padding 0.3s ease-in-out; }
      .fade-in { animation: fadeIn 0.5s ease-in-out; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      
      /* Demo/Scan Animations */
      .audio-bar { transition: height 0.1s ease; }
      
      /* COOL SCAN THINGY: Laser scanner lines */
      .scanning-laser {
        background: linear-gradient(180deg, rgba(34,211,238,0) 0%, rgba(34,211,238,0.8) 50%, rgba(34,211,238,0) 100%);
        box-shadow: 0 0 15px rgba(34,211,238,0.5);
        height: 6px;
        width: 100%;
        position: absolute;
        left: 0;
        z-index: 20;
      }
      .laser-animated {
        animation: scanAnim 2s ease-in-out infinite alternate;
      }
      @keyframes scanAnim {
        0% { top: 0%; opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { top: 100%; opacity: 0; }
      }
    </style>
</head>
